  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="index.html" aria-label="Fight Lab — início"><img src="assets/logo.png" alt="Fight Lab"></a>
    <button class="nav-toggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="nav"><i class="fa-solid fa-bars"></i></button>
    <nav class="nav" id="nav" aria-label="Principal">
      <a href="index.html">Home</a>
      <a href="monte.html">Monte seu Kimono</a>
      <a href="agenda.html" aria-current="page">Minha Equipe</a>
      <a href="costureira.html">Costureira</a>
      <a href="fornecedor.html">Fornecedor</a>
      <a class="btn-wa" href="https://wa.me/5511979690880" target="_blank" rel="noopener"><i class="fa-brands fa-whatsapp"></i> Fale conosco</a>
    </nav>
  </header>

  <main class="container" style="max-width:640px;padding:120px 0 60px">
    <h1 style="text-align:center;margin-bottom:10px">Agende uma reunião</h1>
    <p style="text-align:center;color:var(--muted);margin-bottom:30px">Padronize os kimonos da sua academia. Preencha e retornamos com uma proposta.</p>
    <form class="form" data-fightlab-form data-subject="Proposta de agenda — Dono de academia" novalidate>
      <div class="form-group"><label for="subject">Assunto</label><input id="subject" name="Assunto" type="text" required></div>
      <div class="form-group"><label for="date">Data preferida</label><input id="date" name="Data" type="date" required></div>
      <div class="form-group"><label for="time">Horário</label><input id="time" name="Hora" type="time" required></div>
      <div class="form-group"><label for="phone">Celular</label><input id="phone" name="Celular" type="tel" inputmode="tel" required></div>
      <div class="form-group"><label for="email">E-mail</label><input id="email" name="email" type="email" required></div>
      <div class="form-group"><label for="cnpj">CNPJ</label><input id="cnpj" name="CNPJ" type="text" inputmode="numeric" required></div>
      <div class="form-status" role="status" aria-live="polite"></div>
      <button type="submit" class="btn btn-primary">Enviar proposta</button>
      <p class="form-note">Ao enviar, retornaremos por e-mail/WhatsApp. Nenhum dado é armazenado sem seu contato.</p>
    </form>
  </main>

  <a class="fab-wa" href="https://wa.me/5511979690880" target="_blank" rel="noopener" aria-label="Falar no WhatsApp"><i class="fa-brands fa-whatsapp"></i></a>
